<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vyexx | Contact</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="background-streams">
        <div class="stream s1"></div>
        <div class="stream s2"></div>
        <div class="stream s3"></div>
        <div class="stream s4"></div>
    </div>
    <canvas id="bubbleCanvas"></canvas>

    <main class="container">
        <div class="glass-card" id="tilt-card" style="max-width: 500px;">
            <h1 style="font-size: 1.8rem; margin-bottom: 5px;">Inquiries</h1>
            <p class="subtitle" style="margin-bottom: 25px;">For all professional or creative inquiries, reach out via the methods below.</p>
            
            <div class="contact-list" style="display: flex; flex-direction: column; gap: 15px;">
                <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden;">
                    <span style="font-size: 0.7rem; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px;">Email Address</span>
                    <p style="margin: 5px 0 0 0; font-weight: 500; font-size: 1.1rem; color: #fff;">mynameisvyexx@gmail.com</p>
                </div>

                <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden;">
                    <span style="font-size: 0.7rem; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px;">Discord Handle</span>
                    <p style="margin: 5px 0 0 0; font-weight: 500; font-size: 1.1rem; color: #fff;">fruityparametriceq2</p>
                </div>
            </div>
        </div>
        
        <div class="button-group" style="width: 200px;">
            <a href="https://vyexx.com" class="mag-button">
                <span class="gloss"></span>
                Back Home
            </a>
        </div>
    </main>

    <script src="../script.js"></script>
</body>
</html>
