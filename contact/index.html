<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vyexx | Contact</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="custom-cursor"></div>

    <div class="background-streams">
        <div class="stream s1"></div>
        <div class="stream s2"></div>
        <div class="stream s3"></div>
        <div class="stream s4"></div>
    </div>
    <canvas id="bubbleCanvas"></canvas>
    <div id="shatter-container"></div>

    <main class="container">
        <div class="glass-card draggable" id="tilt-card" style="max-width: 500px;">
            <h1 style="font-size: 1.8rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 20px;">Contacts</h1>
            
            <p style="opacity: 0.8; line-height: 1.6; margin-bottom: 25px;">
                For business inquiries, collaboration, or just to say hi, feel free to reach out via the channels below.
            </p>

            <div class="contact-methods" style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px;">
                <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                    <small style="display: block; opacity: 0.5; margin-bottom: 5px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">Email</small>
                    <span style="font-family: monospace; font-size: 1.1rem;">mynameisvyexx@gmail.com/span>
                </div>

                <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                    <small style="display: block; opacity: 0.5; margin-bottom: 5px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">Discord</small>
                    <span style="font-family: monospace; font-size: 1.1rem;">@vfruityparametriceq2</span>
                </div>
            </div>

            <div class="button-group">
                <a href="../index.html" class="mag-button">
                    <span class="gloss"></span>
                    Back Home
                </a>
            </div>
        </div>
    </main>

    <svg style="display: none;">
        <filter id="crack-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" id="crack-displace" />
        </filter>
    </svg>

    <script src="../script.js"></script>
</body>
</html>
