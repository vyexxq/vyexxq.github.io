<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vyexx</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="custom-cursor" aria-hidden="true"></div>

    <div class="background-waves" aria-hidden="true">
        <canvas id="flow-field"></canvas>
        <div class="bg-vignette"></div>
    </div>

    <div class="film-grain" aria-hidden="true"></div>

    <div id="bubble-layer" aria-hidden="true"></div>

    <div id="shatter-container"></div>
    <div id="card-outline"></div>

    <main class="container">
        <div class="glass-card draggable" id="tilt-card">
            <div class="card-header">
                <p class="stats" id="date">00/00/00</p>
                <div class="system-time" id="clock">00:00:00</div>
            </div>

            <h1>Hi! My name is vyexx</h1>
            <p class="subtitle">I'm a musician, vocalist, and an aspiring game developer.</p>

            <section class="about-section">
                <h3>About vyexx</h3>
                <p>vyexx is an artist born in 2008. Inspired by hyperpop, electric sounds, house, and breakcore.</p>
            </section>

            <div class="button-group">
                <a href="/music" class="mag-button">Explore Music</a>
                <a href="/socials" class="mag-button">Connect</a>
                <a href="/contact" class="mag-button">Contact</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
