<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vyexx</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="custom-cursor"></div>

    <div class="background-streams">
        <div class="stream s1"></div>
        <div class="stream s2"></div>
        <div class="stream s3"></div>
        <div class="stream s4"></div>
    </div>

    <canvas id="bubbleCanvas"></canvas>
    <div id="shatter-container"></div>

    <main class="container" id="main-ui">
        <div class="glass-card draggable" id="tilt-card">
            <p class="stats">4/7/26</p>
            <div class="system-time" id="clock">00:00:00</div>
            <h1>Hi! My name is vyexx</h1>
            <p class="subtitle">I'm a musician, vocalist, and an aspiring game developer.</p>
            
            <section class="about-section">
                <h3>About vyexx</h3>
                <p>vyexx is an artist born in 2008. Inspired by hyperpop, electric sounds, house, and breakcore.</p>
            </section>

            <div class="button-group">
                <a href="music/" class="mag-button"><span class="gloss"></span>Explore Music</a>
                <a href="socials/" class="mag-button"><span class="gloss"></span>Connect</a>
                <a href="contact/" class="mag-button"><span class="gloss"></span>Contact</a>
            </div>
        </div>
    </main>

    <svg style="display: none;">
        <filter id="crack-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" id="crack-displace" />
        </filter>
    </svg>

    <script src="script.js"></script>
</body>
</html>
