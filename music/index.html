<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vyexx | Music</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="custom-cursor"></div>
    <div class="background-streams">
        <div class="stream s1"></div>
        <div class="stream s2"></div>
        <div class="stream s3"></div>
        <div class="stream s4"></div>
    </div>
    <canvas id="bubbleCanvas"></canvas>
    <div id="shatter-container"></div>

    <main class="container">
        <div class="glass-card draggable" id="tilt-card" style="padding: 12px; max-width: 450px;">
            <iframe style="border-radius: 20px" 
                src="https://untitled.stream/embed/YsoQNFu0e4lg" 
                width="100%" height="344" 
                frameborder="0" allowFullScreen="" allow="picture-in-picture" loading="lazy">
            </iframe>

            <div class="button-group">
                <a href="../index.html" class="mag-button">
                    <span class="gloss"></span>
                    Return to Home
                </a>
            </div>
        </div>
    </main>

    <svg style="display: none;">
        <filter id="crack-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" id="crack-displace" />
        </filter>
    </svg>

    <script src="../script.js"></script>
</body>
</html>
